<mat-card class="product-card">
  <mat-card>
      <mat-card-header>
          <mat-card-title>{{product().name}}</mat-card-title>
          <mat-card-subtitle>Category</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
          <p>{{product().description}}</p>
          <p class="price">{{product().price}}</p>
      </mat-card-content>

      <mat-card-actions>
          <button mat-button>{{addButtonLabel()}}</button>
      </mat-card-actions>

      <!-- <mat-card-footer>
          Footer
      </mat-card-footer> -->
  </mat-card>
  </mat-card>
