<div class="products-container">
  <!-- <p>Total products: {{ products().length }}</p> -->
  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Search Products</mat-label>
    <input matInput [(ngModel)] = "searchTerm" placeholder="e.g. headphones"/>
  </mat-form-field>

  <p class="search-preview">
    Search Term: {{searchTerm()}}
  </p>

  <div class="products-grid">
    @for (product of filterProducts(); track product.id) {
      <!-- Vinculação de propriedade -->
      <app-products-card [product]="product"
      (addToCart)="onAddToCard($event)"/>
    }@empty {
      <div class="empty-state">
        <mat-icon>inventory_2 </mat-icon>
        <p>No products match your search</p>

      </div>
    }
  </div>
</div>
